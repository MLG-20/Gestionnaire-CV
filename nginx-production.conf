# Nginx Configuration - Production
# Place this in /etc/nginx/sites-available/gestion-cv

upstream php_fpm {
    server unix:/run/php/php8.4-fpm.sock;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name gestion-cv.com www.gestion-cv.com;

    return 301 https://$server_name$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gestion-cv.com www.gestion-cv.com;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/gestion-cv.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gestion-cv.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;

    # Root directory
    root /var/www/gestion-cv/public;
    index index.php index.html index.htm;

    # Logging
    access_log /var/log/nginx/gestion-cv-access.log combined;
    error_log /var/log/nginx/gestion-cv-error.log warn;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
    gzip_proxied any;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

    # Prevent direct access to /storage without /photos prefix
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP Handler
    location ~ \.php$ {
        fastcgi_pass php_fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60;
    }

    # SECURITY: Disable directory listing in storage
    location ~* ^/storage/ {
        autoindex off;
        # Only serve specific file types
        location ~ \.(webp|jpeg|jpg|png|gif|ico|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
        # Block PHP execution
        location ~ \.php$ {
            return 403;
        }
    }

    # SECURITY: Protect .env and other sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # SECURITY: Protect laravel core files
    location ~ \.(env|php.example|composer.lock)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|eot|otf|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
